<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Someone Special 💖</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Segoe UI',sans-serif;
  background:url('https://i.imgur.com/8Km9tLL.jpg') center/cover no-repeat;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

/* overlay */
body::before{
  content:'';
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(255,182,193,0.35);
  backdrop-filter:blur(10px);
  z-index:-1;
}

/* card */
.container{
  width:90%;
  max-width:360px;
  background:rgba(255,255,255,0.8);
  backdrop-filter:blur(14px);
  border-radius:22px;
  padding:22px;
  text-align:center;
  box-shadow:0 10px 40px rgba(0,0,0,0.2);
}

h1,h2{color:#ff5c8a;margin-bottom:10px}
p{font-size:15px;line-height:1.5;color:#333}

/* buttons */
.btn{
  width:100%;
  padding:13px;
  margin-top:12px;
  border:none;
  border-radius:14px;
  background:linear-gradient(45deg,#ff6fa5,#ffc1cc);
  color:white;
  font-size:15px;
  transition:0.2s;
}
.btn:active{transform:scale(0.96)}

.yes{background:linear-gradient(45deg,#28a745,#6ee17a)}
.no{background:#ff4d4d;position:relative}

/* gifs */
img{
  width:95px;
  margin:6px;
  border-radius:12px;
  opacity:0;
  animation:fade 1s forwards;
}
img:nth-child(1){animation-delay:0.4s}
img:nth-child(2){animation-delay:0.8s}
img:nth-child(3){animation-delay:1.2s}

@keyframes fade{to{opacity:1}}

/* hearts */
.heart{
  position:fixed;
  bottom:-10px;
  font-size:18px;
  animation:float 6s linear infinite;
}
@keyframes float{to{transform:translateY(-100vh)}}

/* floating button */
.float{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#ff6fa5;
  color:white;
  padding:12px 16px;
  border-radius:30px;
  font-size:14px;
}

/* popup */
.popup{
  display:none;
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:white;
  padding:20px;
  border-radius:20px 20px 0 0;
  animation:slide 0.3s ease;
}
@keyframes slide{from{transform:translateY(100%)} to{transform:translateY(0)}}

input{
  width:90%;
  padding:10px;
  border-radius:10px;
  border:1px solid #ddd;
  margin-top:10px;
}

.footer{font-size:12px;margin-top:10px;color:#555}
</style>
</head>

<body>

<div class="container" id="app">

<!-- PAGE 1 -->
<div id="p1">
<h1 id="title"></h1>
<p id="typing"></p>
<button class="btn" onclick="next(2)">Enter 💖</button>
</div>

<!-- PAGE 2 -->
<div id="p2" style="display:none;">
<h2>Sorry 🥺</h2>
<p id="shayari"></p>

<img src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif">
<img src="https://media.giphy.com/media/j5QcmXoFWl4Q0/giphy.gif">

<button class="btn" onclick="next(3)">Next 😚</button>
</div>

<!-- PAGE 3 -->
<div id="p3" style="display:none;">
<h2>Listen na 🥺</h2>

<p id="fun1"></p>
<p id="fun2"></p>

<img src="https://media.giphy.com/media/3oriO0OEd9QIDdllqo/giphy.gif">
<img src="https://media.giphy.com/media/l0MYt5jPR6QX5pnqM/giphy.gif">
<img src="https://media.giphy.com/media/5GoVLqeAOo6PK/giphy.gif">

<button class="btn" onclick="next(4)">Final 😳</button>
</div>

<!-- PAGE 4 -->
<div id="p4" style="display:none;">
<h2>Forgive me? 🥺</h2>
<button class="btn yes" onclick="celebrate()">YES 💖</button>
<button class="btn no" id="no">NO 😒</button>
</div>

<!-- CELEBRATION -->
<div id="celebration" style="display:none;">
<h2>YAYYY 😭💖</h2>

<p id="finalText"></p>

<button class="btn" onclick="playYT()">Yeh moment sirf hum dono ke liye 🥺🎶</button>

<div id="yt" style="display:none;margin-top:10px;">
<iframe width="100%" height="200"
src="https://www.youtube.com/embed/DkTRLHXMw8k?autoplay=1"
allow="autoplay"></iframe>
</div>

</div>

<div class="footer">Made by Akarsh Mehta ™️</div>

</div>

<!-- FLOAT -->
<button class="float" onclick="openPop()">Create Yours 💖</button>

<!-- POPUP -->
<div class="popup" id="pop">
<h3>Create Your Link 💖</h3>
<input id="f" placeholder="Your Name">
<input id="t" placeholder="Their Name">
<button class="btn" onclick="gen()">Generate</button>
<p id="link"></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

/* params */
let p=new URLSearchParams(location.search);
let to=p.get("to")||"Someone Special";
let from=p.get("from")||"Someone";

/* title */
document.getElementById("title").innerText="Hey "+to+" 🥺💗";

/* typing intro */
let text=`Sach bolu ${to}… jab tu gussa hoti hai na, sab ajeeb lagta hai 🥺`;
let i=0;
(function(){
 if(i<text.length){
  document.getElementById("typing").innerHTML+=text[i++];
  setTimeout(arguments.callee,40);
 }
})();

/* shayari */
let lines=[
`Jab tu hasti hai na ${to}… mera din ban jata hai 💗`,
`${to}, tumhari aadat si ho gayi hai mujhe…`,
`Gussa bhi tumhara pyara lagta hai…`,
`Bas maaf kar do na ${to} 🥺👉👈`
];
let j=0;
function typeS(){
 if(j<lines.length){
  document.getElementById("shayari").innerHTML+=lines[j]+"<br>";
  j++;
  setTimeout(typeS,800);
 }
}
typeS();

/* fun */
document.getElementById("fun1").innerText=`${to} gussa = mera system hang 😭`;
document.getElementById("fun2").innerText=`${to} smile = mera pura din set 💗`;

/* nav */
function next(n){
 document.querySelectorAll("#app > div").forEach(d=>d.style.display="none");
 document.getElementById("p"+n).style.display="block";
}

/* no button */
let no=document.getElementById("no");
no.onmouseover=no.ontouchstart=function(){
 no.style.position="absolute";
 no.style.top=Math.random()*200+"px";
 no.style.left=Math.random()*200+"px";
}

/* celebration */
function celebrate(){
 document.querySelectorAll("#app > div").forEach(d=>d.style.display="none");
 document.getElementById("celebration").style.display="block";

 confetti({particleCount:180,spread:120});

 let msg=[
  `Main perfect nahi hoon ${to}…`,
  `Par tere liye better banna chahta hoon 🥺`,
  `I love you ${to} 💖`,
  `– From ${from} 💌`
 ];
 let k=0;
 function type(){
  if(k<msg.length){
   document.getElementById("finalText").innerHTML+=msg[k]+"<br>";
   k++;
   setTimeout(type,900);
  }
 }
 setTimeout(type,400);
}

/* song */
function playYT(){
 document.getElementById("yt").style.display="block";
}

/* popup */
function openPop(){
 document.getElementById("pop").style.display="block";
}

/* generator */
function gen(){
 let f=document.getElementById("f").value;
 let t=document.getElementById("t").value;
 let url=location.href.split("?")[0]+"?to="+t+"&from="+f;
 document.getElementById("link").innerText=url;
}

/* hearts */
setInterval(()=>{
 let h=document.createElement("div");
 h.className="heart";
 h.innerHTML="💖";
 h.style.left=Math.random()*100+"vw";
 document.body.appendChild(h);
 setTimeout(()=>h.remove(),6000);
},600);

</script>

</body>
  </html>
