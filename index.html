<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dudu Bubu 💖</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:url('https://i.imgur.com/8Km9tLL.jpg') center/cover no-repeat;
  overflow:hidden;
}

/* overlay */
body::before{
  content:'';
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.3);
  backdrop-filter:blur(6px);
  z-index:-1;
}

/* container */
.container{
  width:92%;
  max-width:380px;
  margin:20px auto;
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(12px);
  border-radius:20px;
  padding:20px;
  text-align:center;
  box-shadow:0 10px 40px rgba(0,0,0,0.3);
}

/* text */
h1,h2{color:#ff4d88}

/* buttons */
.btn{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:14px;
  background:linear-gradient(45deg,#ff4d88,#ff85a2);
  color:white;
  font-size:16px;
  box-shadow:0 0 15px #ff99bb;
  transition:0.2s;
}
.btn:active{transform:scale(0.95)}

.yes{background:linear-gradient(45deg,#28a745,#5cd65c)}
.no{background:#dc3545;position:relative}

/* gifs */
img{width:95px;margin:5px;border-radius:12px;opacity:0;animation:fadeIn 1s forwards}
img:nth-child(1){animation-delay:0.5s}
img:nth-child(2){animation-delay:1s}
img:nth-child(3){animation-delay:1.5s}

@keyframes fadeIn{
  to{opacity:1}
}

/* floating hearts */
.heart{
  position:fixed;
  bottom:-10px;
  animation:float 6s linear infinite;
}
@keyframes float{to{transform:translateY(-100vh)}}

/* floating button */
.float{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#ff4d88;
  color:white;
  padding:12px 16px;
  border-radius:30px;
}

/* popup */
.popup{
  display:none;
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:rgba(255,255,255,0.95);
  backdrop-filter:blur(15px);
  padding:20px;
  border-radius:20px 20px 0 0;
  animation:slideUp 0.4s ease;
}
@keyframes slideUp{
  from{transform:translateY(100%)}
  to{transform:translateY(0)}
}

input{
  width:90%;
  padding:10px;
  border-radius:10px;
  border:1px solid #ccc;
  margin-top:10px;
}

.footer{font-size:12px;margin-top:10px}

/* fade pages */
.fade{animation:fade 0.5s}
@keyframes fade{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}

/* cinematic */
.cinema{
  background:rgba(0,0,0,0.6)!important;
  color:white;
}
</style>
</head>

<body>

<div class="container" id="app">

<div id="p1" class="fade">
<h1 id="title">Hey Bubu 🥺</h1>
<p id="typing"></p>
<button class="btn" onclick="next(2)">Enter 💖</button>
</div>

<div id="p2" style="display:none;">
<h2>Sorry 🥺</h2>
<p id="shayari"></p>

<img src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif">
<img src="https://media.giphy.com/media/j5QcmXoFWl4Q0/giphy.gif">

<button class="btn" onclick="next(3)">Next 😚</button>
</div>

<div id="p3" style="display:none;">
<h2>Dudu Bubu 😂</h2>
<p>Tu gussa = network down 📶❌</p>
<p>Tu smile = life set 😍</p>

<img src="https://media.giphy.com/media/3oriO0OEd9QIDdllqo/giphy.gif">
<img src="https://media.giphy.com/media/l0MYt5jPR6QX5pnqM/giphy.gif">
<img src="https://media.giphy.com/media/5GoVLqeAOo6PK/giphy.gif">

<button class="btn" onclick="next(4)">Final 😳</button>
</div>

<div id="p4" style="display:none;">
<h2>Forgive me? 🥺</h2>
<button class="btn yes" onclick="celebrate()">YES 💖</button>
<button class="btn no" id="no">NO 😒</button>
</div>

<div id="celebration" style="display:none;" class="fade">
<h2>YAYYY 😭💖</h2>
<p id="finalText"></p>

<button class="btn" onclick="playYT()">Tap to feel this moment 💖🎶</button>

<div id="yt" style="display:none;margin-top:10px;">
<iframe width="100%" height="200"
src="https://www.youtube.com/embed/DkTRLHXMw8k?autoplay=1"
allow="autoplay"></iframe>
</div>
</div>

<div class="footer">Made by Akarsh Mehta ™️</div>

</div>

<button class="float" onclick="openPop()">Create Yours 💖</button>

<div class="popup" id="pop">
<h3>Create Link 💖</h3>
<input id="f" placeholder="Your Name">
<input id="t" placeholder="Bubu Name">
<button class="btn" onclick="genPop()">Generate</button>
<p id="plink"></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
function next(n){
 document.querySelectorAll("#app > div").forEach(d=>d.style.display="none");
 document.getElementById("p"+n).style.display="block";
}

/* typing intro */
let txt="Please gussa mat ho… your dudu is really sorry 🥺💗";
let i=0;
(function type(){
 if(i<txt.length){
  document.getElementById("typing").innerHTML+=txt[i++];
  setTimeout(type,40);
 }
})();

/* shayari typing */
let shayari=[
"Tum meri duniya ho 💗",
"Tum bin sab adhoora hai…",
"Gussa tumhara bhi pyara lagta hai…",
"Maaf kar do na mujhe Bubu 🥺👉👈"
];
let j=0;
function typeShayari(){
 if(j<shayari.length){
  document.getElementById("shayari").innerHTML+=shayari[j]+"<br>";
  j++;
  setTimeout(typeShayari,800);
 }
}
typeShayari();

/* NO button */
let no=document.getElementById("no");
no.onmouseover=no.ontouchstart=function(){
 no.style.position="absolute";
 no.style.top=Math.random()*200+"px";
 no.style.left=Math.random()*200+"px";
}

/* celebration cinematic */
function celebrate(){
 document.querySelectorAll("#app > div").forEach(d=>d.style.display="none");
 document.getElementById("celebration").style.display="block";
 document.body.classList.add("cinema");
 confetti({particleCount:200,spread:120});

 let text=[
  "Tu meri duniya hai 💗",
  "Main promise karta hoon kabhi hurt nahi karunga 🥺",
  "I love you my Bubu 💖"
 ];
 let k=0;
 let box=document.getElementById("finalText");
 box.innerHTML="";
 function typeFinal(){
  if(k<text.length){
    box.innerHTML+=text[k]+"<br>";
    k++;
    setTimeout(typeFinal,1000);
  }
 }
 typeFinal();
}

/* song */
function playYT(){
 document.getElementById("yt").style.display="block";
}

/* popup */
function openPop(){
 document.getElementById("pop").style.display="block";
}

/* generate */
function genPop(){
 let f=document.getElementById("f").value;
 let t=document.getElementById("t").value;
 let url=location.href.split("?")[0]+"?to="+t+"&from="+f;
 document.getElementById("plink").innerText=url;
}

/* name */
let p=new URLSearchParams(location.search);
if(p.get("to")){
 document.getElementById("title").innerText="Hey "+p.get("to")+" 🥺💗";
}

/* hearts */
setInterval(()=>{
 let h=document.createElement("div");
 h.className="heart";
 h.innerHTML="💖";
 h.style.left=Math.random()*100+"vw";
 document.body.appendChild(h);
 setTimeout(()=>h.remove(),6000);
},500);
</script>

</body>
  </html>
